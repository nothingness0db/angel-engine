packages:
  - "apps/*"
  - "desktop"
  - "packages/*"
  - "crates/angel-engine-client-napi"
  - "!vendor/**"

nodeLinker: isolated
hoistPattern:
  - "*"
blockExoticSubdeps: false

peerDependencyRules:
  allowedVersions:
    "@electron-forge/plugin-fuses>@electron/fuses": "^2.1.1"

allowBuilds:
  "@electron/node-gyp": true
  "@parcel/watcher": true
  "@tailwindcss/oxide": true
  "better-sqlite3": true
  "electron": true
  "electron-winstaller": true
  "esbuild": true
  "fs-xattr": true
  "macos-alias": true
  "msgpackr-extract": true
  "msw": true
  "sharp": true
  "unrs-resolver": true

patchedDependencies:
  "@anthropic-ai/claude-agent-sdk@0.2.141": patches/@anthropic-ai__claude-agent-sdk@0.2.141.patch
